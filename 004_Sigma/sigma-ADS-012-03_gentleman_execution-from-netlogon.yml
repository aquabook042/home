title: Gentlemen Ransomware - Execution from NETLOGON Share
id: a1b2c3d4-0012-0003-0012-000000000012
status: experimental
description: |
  Detects execution of ransomware binaries from NETLOGON share as used by
  The Gentlemen for domain-wide deployment via GPO startup scripts.
  Known binary names include gentlemen.exe, gentlemen_win64.exe.
  Requires an 8-byte password parameter at runtime (anti-analysis measure).
references:
  - https://attack.mitre.org/techniques/T1486
  - https://attack.mitre.org/techniques/T1072
  - https://www.fortiguard.com/threat-actor/6387/the-gentlemen-ransomware
author: Claude (ADS-012 auto-generated)
date: 2026-06-26
tags:
  - attack.impact
  - attack.t1486
  - attack.lateral_movement
  - attack.t1072
logsource:
  product: windows
  category: process_creation
detection:
  selection_netlogon:
    Image|contains: '\NETLOGON\'
    Image|endswith: '.exe'
  selection_known_name:
    Image|contains:
      - 'gentlemen'
      - 'gentleman'
  condition: selection_netlogon or selection_known_name
falsepositives:
  - Legitimate administrative scripts deployed via NETLOGON (review carefully)
level: high
