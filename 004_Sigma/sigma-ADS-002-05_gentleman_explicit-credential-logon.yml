title: "The Gentlemen - Logon with Explicit Credentials (Harvested VPN Credentials)"
id: a1b2c3d4-0002-0005-0002-000000000002
status: experimental
description: |
  Detects logon attempts using explicitly specified credentials (EventID 4648),
  which may indicate adversary reuse of harvested VPN/domain credentials by The Gentlemen
  ransomware group (ADS-002 / T1078.002). Typically observed after FortiGate VPN
  compromise via CVE-2024-55591 where credential material is extracted and reused
  for lateral movement within the domain.
references:
  - https://attack.mitre.org/techniques/T1078/002
  - https://www.trendmicro.com/en_us/research/25/i/unmasking-the-gentlemen-ransomware.html
  - https://www.microsoft.com/en-us/security/blog/2026/05/28/the-gentlemen-ransomware-dissecting-a-self-propagating-go-encryptor/
author: "Claude (ADS-002 auto-generated)"
date: 2026-06-26
tags:
  - attack.persistence
  - attack.lateral_movement
  - attack.t1078.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4648
  filter_machine_accounts:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_machine_accounts
falsepositives:
  - Scheduled tasks using service accounts with explicit credentials
  - Legitimate remote management tools (e.g., runas.exe by administrators)
  - IT automation scripts with hardcoded credentials
level: medium
